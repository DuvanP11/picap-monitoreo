# Rails app deploy a Render — Picap Monitoreo (Docker runtime)
#
# Después del bug del Ruby native runtime de Render (RUBIES_ROOT null),
# nos fuimos a Docker. El Dockerfile es el default de Rails 7.1 — robusto.

services:
  - type: web
    name: picap-monitoreo-rails
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /up
    # El CMD del Dockerfile es ./bin/rails server. Lo sobreescribimos para
    # usar Puma con nuestra config (que lee $PORT que Render inyecta).
    dockerCommand: bundle exec puma -C config/puma.rb

    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: enabled
      - key: RAILS_SERVE_STATIC_FILES
        value: enabled
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RAILS_MAX_THREADS
        value: "5"

      # Secretos
      - key: RAILS_MASTER_KEY
        sync: false
      - key: CLICKHOUSE_HOST
        sync: false
      - key: CLICKHOUSE_PORT
        sync: false
      - key: CLICKHOUSE_USERNAME
        sync: false
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: CLICKHOUSE_DATABASE
        sync: false
      - key: CLICKHOUSE_SECURE
        value: "true"
      - key: CLICKHOUSE_READ_TIMEOUT
        value: "300"
      - key: TOKEN_SECRET
        sync: false

      # Email vía Resend.com (reemplazo de SMTP clásico).
      # Generar API key en https://resend.com → API Keys (formato re_XXXX).
      - key: RESEND_API_KEY
        sync: false
      # Opcional. Para usar @picap.io verificar dominio en resend.com → Domains.
      # Si se omite, default = "Picap Monitoreo <onboarding@resend.dev>".
      - key: RESEND_FROM
        sync: false
